<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Employee Tracker</title>

    <style>


        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
        }

        #toolbar {
            background: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #warehouse {
            position: relative;
            width: 1600px;
            height: 1000px;
            margin: 20px auto;

            background-image: url(WH.png);
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;

            border: 2px solid #ccc;
            background-color: white;
        }

        .employee {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: dodgerblue;
            color: white;
            font-weight: bold;
            cursor: pointer;

            display: flex;
            justify-content: center;
            align-items: center;

            transition:
                left .5s ease,
                top .5s ease;
        }

        .employee.selected {
            background: crimson;
            transform: scale(1.2);
        }

        .label {
            position: absolute;
            top: 50px;
            left: -40px;
            width: 120px;
            text-align: center;
            color: black;
            font-size: 12px;
            font-weight: normal;
        }

        #instructions {
            padding: 10px 20px;
            color: #555;
        }
    </style>
</head>
<body>

<h1 style="color:red">VERSION 10</h1>

<div id="toolbar">

    <input
        id="employeeName"
        type="text"
        placeholder="Employee Name"
    >

    <input
        id="tagId"
        type="text"
        placeholder="Scan QR Code"
    >

    <button onclick="assignTag()">
        Assign Tag
    </button>

</div>

<div id="assignments">
    <h3>Current Assignments</h3>
    <div id="assignmentList"></div>
</div>

</div>

<div id="instructions">
    1. Add an employee<br>
    2. Click their icon to select them<br>
    3. Click anywhere on the warehouse map to move them
</div>

<div id="warehouse"></div>

<script>

const warehouse = document.getElementById("warehouse");

let selectedEmployee = null;
const tagAssignments = {};

function addEmployee(defaultName = null) {

    const input =
        document.getElementById("employeeName");

    const name =
        defaultName || input.value.trim();

    if (name === "")
        return;

    if (document.getElementById(name))
        return;

    const employee =
        document.createElement("div");

    employee.className = "employee";
    employee.id = name;

    employee.style.left = "50px";
    employee.style.top = "50px";

    employee.innerHTML =
        name.charAt(0).toUpperCase() +
        `<div class="label">${name}</div>`;

    employee.addEventListener("click", function(e) {

        e.stopPropagation();

        document
            .querySelectorAll(".employee")
            .forEach(emp =>
                emp.classList.remove("selected")
            );

        employee.classList.add("selected");
        selectedEmployee = employee;
    });

    warehouse.appendChild(employee);

   if (!defaultName) {
    input.value = "";
}
}


function assignTag() {

    const employee =
        document.getElementById("employeeName")
        .value
        .trim();

    const tag =
        document.getElementById("tagId")
        .value
        .trim();

    if (!employee || !tag) {
        alert("Enter employee and tag.");
        return;
    }

    tagAssignments[tag] = employee;

    if (!document.getElementById(employee)) {
        addEmployee(employee);
    }

    renderAssignments();

    document.getElementById("employeeName").value = "";
    document.getElementById("tagId").value = "";
}


function renderAssignments() {

    const list =
        document.getElementById("assignmentList");

    list.innerHTML = "";

    for (const tag in tagAssignments) {

        const row =
            document.createElement("div");

        row.innerText =
            `${tag} → ${tagAssignments[tag]}`;

        list.appendChild(row);
    }
}


function removeEmployee() {

    if (!selectedEmployee) {
        alert("Select an employee first.");
        return;
    }

    selectedEmployee.remove();
    selectedEmployee = null;
}

warehouse.addEventListener("click", function(e) {

    if (!selectedEmployee)
        return;

    const rect =
        warehouse.getBoundingClientRect();

    const x =
        e.clientX - rect.left - 22;

    const y =
        e.clientY - rect.top - 22;

    selectedEmployee.style.left = x + "px";
    selectedEmployee.style.top = y + "px";

    selectedEmployee.classList.remove("selected");
    selectedEmployee = null;
});

async function updateEmployeeLocation() {
    try {
        const response =
            await fetch("http://127.0.0.1:5000/location");

        const data = await response.json();

        document.getElementById("debug").innerText =
            JSON.stringify(data);

        const employee =
            document.getElementById(data.name);

        if (!employee || data.rssi == null)
            return;

        if (data.rssi > -50) {
            employee.style.left = "200px";
            employee.style.top = "200px";
        }
        else if (data.rssi > -65) {
            employee.style.left = "500px";
            employee.style.top = "300px";
        }
        else {
            employee.style.left = "800px";
            employee.style.top = "400px";
        }

    } catch (err) {
        document.getElementById("debug").innerText =
            "ERROR: " + err;
    }
}


setInterval(updateEmployeeLocation, 2000);


addEmployee("Emily");
addEmployee("John");
addEmployee("Sarah");
addEmployee("Mike");

</script>

<div id="debug"
     style="
        width:1600px;
        margin:20px auto;
        padding:15px;
        background:#f3f4f6;
        border:1px solid #ccc;
        font-family:monospace;
     ">
Waiting for data...
</div>

</body>
</html>
