<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Worker Tracker</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "DM Sans", sans-serif;
      background: #0f172a;
      color: white;
    }

    .warehouse-floor {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #1e293b;
    }

    .zone {
      position: absolute;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .worker {
      position: absolute;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .worker:hover {
      transform: scale(1.3);
    }

    .tooltip {
      display: none;
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      white-space: nowrap;
      pointer-events: none;
    }

    .worker:hover .tooltip {
      display: block;
    }

    @keyframes path1 {
      0% { left: 5%; top: 70%; }
      25% { left: 25%; top: 30%; }
      50% { left: 55%; top: 25%; }
      75% { left: 75%; top: 60%; }
      100% { left: 5%; top: 70%; }
    }

    @keyframes path2 {
      0% { left: 80%; top: 75%; }
      30% { left: 60%; top: 50%; }
      60% { left: 30%; top: 60%; }
      100% { left: 80%; top: 75%; }
    }

    @keyframes path3 {
      0% { left: 10%; top: 20%; }
      33% { left: 45%; top: 65%; }
      66% { left: 80%; top: 30%; }
      100% { left: 10%; top: 20%; }
    }

    @keyframes path4 {
      0% { left: 50%; top: 80%; }
      25% { left: 20%; top: 45%; }
      50% { left: 60%; top: 15%; }
      75% { left: 85%; top: 50%; }
      100% { left: 50%; top: 80%; }
    }

    @keyframes path5 {
      0% { left: 90%; top: 20%; }
      50% { left: 15%; top: 55%; }
      100% { left: 90%; top: 20%; }
    }

    .w1 { animation: path1 12s ease-in-out infinite; }
    .w2 { animation: path2 9s ease-in-out infinite; }
    .w3 { animation: path3 14s ease-in-out infinite; }
    .w4 { animation: path4 11s ease-in-out infinite; }
    .w5 { animation: path5 10s ease-in-out infinite; }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <header class="p-6">
    <h1 class="text-3xl font-bold">
      Warehouse Worker Tracker
    </h1>
    <p class="text-slate-300 mt-2">
      Simulated live warehouse activity map
    </p>
  </header>

  <main class="flex-1 px-6 pb-6">

    <div class="warehouse-floor rounded-xl overflow-hidden">

      <!-- Zones -->
      <div class="zone" style="left:2%; top:5%; width:30%; height:35%;">
        Shelving A
      </div>

      <div class="zone" style="left:36%; top:5%; width:28%; height:30%;">
        Shelving B
      </div>

      <div class="zone" style="left:68%; top:5%; width:30%; height:35%;">
        Packing
      </div>

      <div class="zone" style="left:2%; top:55%; width:25%; height:40%;">
        Receiving
      </div>

      <div class="zone" style="left:32%; top:50%; width:34%; height:30%;">
        Staging
      </div>

      <div class="zone" style="left:70%; top:55%; width:28%; height:40%;">
        Loading Dock
      </div>

      <!-- Workers -->
      <div class="worker w1" style="background:#f59e0b;">
        🧑‍🔧
        <span class="tooltip">Marcus — Picker</span>
      </div>

      <div class="worker w2" style="background:#3b82f6;">
        🧑‍🔧
        <span class="tooltip">Aisha — Packer</span>
      </div>

      <div class="worker w3" style="background:#10b981;">
        🧑‍🔧
        <span class="tooltip">Carlos — Forklift</span>
      </div>

      <div class="worker w4" style="background:#ec4899;">
        🧑‍🔧
        <span class="tooltip">Dana — Loader</span>
      </div>

      <div class="worker w5" style="background:#8b5cf6;">
        🧑‍🔧
        <span class="tooltip">Jin — Supervisor</span>
      </div>

    </div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-6 mt-6 text-sm">

      <div class="flex items-center gap-2">
        <span class="w-4 h-4 rounded-full inline-block bg-amber-500"></span>
        Picker
      </div>

      <div class="flex items-center gap-2">
        <span class="w-4 h-4 rounded-full inline-block bg-blue-500"></span>
        Packer
      </div>

      <div class="flex items-center gap-2">
        <span class="w-4 h-4 rounded-full inline-block bg-emerald-500"></span>
        Forklift
      </div>

      <div class="flex items-center gap-2">
        <span class="w-4 h-4 rounded-full inline-block bg-pink-500"></span>
        Loader
      </div>

      <div class="flex items-center gap-2">
        <span class="w-4 h-4 rounded-full inline-block bg-violet-500"></span>
        Supervisor
      </div>

    </div>

  </main>

</body>
</html>
